---
输出模板: |
  【系统提示】检测到你的属性已达到晋级条件！

  ━━━ 晋级信息 ━━━
  【当前等级】X级
  【当前总属性点】XXX
  【沉淀点】XX点（晋级时1:1转化为可分配属性点）

  ━━━ 可选晋级路线 ━━━
  【晋级路线】 | 【消耗】 | 【效果】
  〖X级轮回者〗 | XXX兑换点 | 晋升为X级轮回者，各项属性上限提升

  ━━━ 注意事项 ━━━
  - 晋级后属性上限提升，可继续成长
  - 沉淀点将在晋级时释放为可分配属性点
  - 晋级后可进入更高等级的世界

  是否前往【晋级中心】进行晋级？

玩家选项:
  - 前往晋级中心进行晋级
  - 暂不晋级，继续当前活动
  - 查看详细晋级信息

晋级收益:
  - 属性上限提升
  - HP基础值增加
  - 掌握加成提升
  - 解锁更高等级的世界
  - 解锁更高等级的装备/技能
  - 解锁新的晋级路线
  - 沉淀点释放为可分配属性点
