---
变量更新规则:
  输出原则:
    - 数据表不是每回合必须输出
    - 优先使用自然语言描述战斗进展
    - 仅在必要时使用数据表提供精确数值

  必须输出数据表的时机:
    战斗场景:
      - 战斗开始时（展示初始状态）
      - 战斗结束时（展示最终结果）
    非战斗场景:
      - 进入新场景/世界时
      - 完成任务获得奖励后
      - 晋级/兑换/装备变更后
      - 玩家主动请求查看状态时

  玩家:
    基础属性:
      check:
        - 仅通过晋级、装备、技能、任务奖励修改
        - 单项属性不能超过当前等级上限
    战斗属性.HP.当前:
      type: number
      check:
        - 战斗中根据伤害/治疗实时更新
        - 不能超过最大HP
        - 归零时触发世界脱离
    战斗属性.HP.最大:
      check:
        - 仅通过体质变化、装备、技能、晋级修改
    战斗属性.护盾:
      check:
        - 战斗中获得护盾技能/道具时添加
        - 每回合扣除伤害后更新
        - 战斗结束后清零
    状态:
      type: array
      check:
        - 获得/解除状态时更新
        - 每回合结束时检查持续时间
        - 过期状态自动移除
    技能:
      type: array
      check:
        - 新获得技能时添加
        - 使用技能时检查冷却
        - 每回合结束时减少冷却
    装备:
      check:
        - 装备/卸下时更新
        - 更新后重新计算战斗属性
    物品栏:
      type: object
      check:
        - 获取/消耗/丢弃物品时更新数量
        - 数量归零后移除该物品
    兑换点:
      type: number
      check:
        - 完成任务、击败敌人、出售物品时增加
        - 购买、晋级、强化时扣除
        - 不能为负数

  任务:
    主线.完成度:
      type: number
      range: 0~100
      check:
        - 根据剧情推进更新
        - 达到100时触发任务结算
    支线:
      type: array
      check:
        - 触发新支线时添加
        - 完成或放弃时移除

  世界:
    当前场景:
      check:
        - 玩家移动时更新
        - 返回已探索区域保持一致
    当前世界:
      check:
        - 进入新世界时初始化
        - 离开世界时保存进度
    战斗状态:
      type: boolean
      check:
        - 进入战斗时设为true
        - 战斗结束或逃跑时设为false
    回合数:
      type: number
      check:
        - 战斗开始时重置为0
        - 每回合结束时+1
        - 第5回合结束后启用环境侵蚀

  战斗:
    敌人:
      type: array
      check:
        - 战斗开始时生成敌人列表
        - 敌人死亡时移除
        - 每回合更新敌人状态
    战斗日志:
      type: array
      check:
        - 记录关键战斗事件
        - 战斗结束后清空

  进度:
    完成世界数:
      type: number
      check:
        - 世界结算成功时+1
    当前世界存活时间:
      type: number
      check:
        - 每小时+1
        - 世界脱离后重置为0
    总游戏时间:
      type: number
      check:
        - 持续累计
    死亡次数:
      type: number
      check:
        - 世界脱离时+1
