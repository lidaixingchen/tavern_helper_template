---
变量更新规则:
  玩家:
    名称:
      check:
        - 角色名称通常不变，除非有特殊剧情
    基础属性:
      check:
        - 仅通过晋级、装备、技能、任务奖励修改
        - 单项属性不能超过当前等级上限
    等级:
      check:
        - 仅通过晋级中心晋升
        - 晋级时重新计算战斗属性
    沉淀点:
      type: number
      check:
        - 属性超过上限时自动转化
        - 可用于兑换特殊能力
    战斗属性.HP.当前:
      type: number
      check:
        - 战斗中根据伤害/治疗实时更新
        - 不能超过最大HP
        - 归零时触发世界脱离
    战斗属性.HP.最大:
      type: number
      check:
        - 仅通过体质变化、装备、技能、晋级修改
    战斗属性.护盾:
      type: number
      check:
        - 战斗中获得护盾技能/道具时添加
        - 每回合扣除伤害后更新
        - 战斗结束后清零
    战斗属性.物理攻击:
      type: number
      check:
        - 根据力量和装备重新计算
    战斗属性.法术攻击:
      type: number
      check:
        - 根据智力和装备重新计算
    战斗属性.物理防御:
      type: number
      check:
        - 根据体质和装备重新计算
    战斗属性.法术防御:
      type: number
      check:
        - 根据感知和装备重新计算
    战斗属性.DDC:
      type: number
      check:
        - 10 + 敏捷/感知属性加成(取高) + 装备闪避加值
    战斗属性.暴击率:
      type: number
      check:
        - 5% + (魅力/2)%，最大50%
    状态:
      type: array
      check:
        - 获得/解除状态时更新
        - 每回合结束时检查持续时间
        - 过期状态自动移除
    性格特征:
      type: array
      check:
        - 角色发展时可能获得新特征
    技能:
      type: array
      check:
        - 新获得技能时添加
        - 使用技能时检查冷却
        - 每回合结束时减少冷却
    装备:
      check:
        - 装备/卸下时更新
        - 更新后重新计算战斗属性
    物品栏:
      type: object
      check:
        - 获取/消耗/丢弃物品时更新数量
        - 数量归零后移除该物品
    兑换点:
      type: number
      check:
        - 完成任务、击败敌人、出售物品时增加
        - 购买、晋级、强化时扣除
        - 不能为负数
    位置:
      check:
        - 玩家移动时更新
        - 返回已探索区域保持一致

  任务:
    主线:
      check:
        - 根据剧情推进更新完成度
        - 达到100时触发任务结算
    支线:
      type: array
      check:
        - 触发新支线时添加
        - 完成或放弃时移除

  世界:
    当前场景:
      check:
        - 玩家移动时更新
        - 返回已探索区域保持一致
    当前世界:
      check:
        - 进入新世界时初始化
        - 离开世界时保存进度
    关键NPC:
      type: array
      check:
        - 遇到新NPC时添加
        - NPC状态变化时更新
    战斗状态:
      type: boolean
      check:
        - 进入战斗时设为true
        - 战斗结束或逃跑时设为false
    回合数:
      type: number
      check:
        - 战斗开始时重置为0
        - 每回合结束时+1
        - 第5回合结束后启用环境侵蚀
    环境侵蚀:
      type: boolean
      check:
        - 第5回合后自动设为true
        - 世界脱离后重置为false

  战斗:
    敌人:
      type: array
      check:
        - 战斗开始时生成敌人列表
        - 敌人死亡时移除
        - 每回合更新敌人状态
    战斗日志:
      type: array
      check:
        - 记录关键战斗事件
        - 战斗结束后清空

  进度:
    完成世界数:
      type: number
      check:
        - 世界结算成功时+1
    当前世界存活时间:
      type: number
      check:
        - 每小时+1
        - 世界脱离后重置为0
    总游戏时间:
      type: number
      check:
        - 持续累计
    死亡次数:
      type: number
      check:
        - 世界脱离时+1
