---
人物等级体系:
  说明: 等级与SPV体系对照，SPV（阶位标准力）是所有数值体系的基础

  等级划分:
    说明: 等级由总基础属性点决定（技能、装备加成不计入）
    对照表:
      F级: 30-119
      E级: 120-209
      D级: 210-329
      C级: 330-479
      B级: 480-659
      A级: 660-869
      S级: 870-1109
      SS级: 1110-1379
      SSS级: 1380+

  单项属性上限:
    F级: 30
    E级: 45
    D级: 60
    C级: 80
    B级: 100
    A级: 125
    S级: 150
    SS级: 180
    SSS级: 无上限

  属性加成: 属性值对应的加成数值，详见【00-核心定义/属性加成表】

  初始设定:
    总基础属性: 60点
    起始等级: F级
    初始属性分配: 60点自由分配至六维（单项5-15）
    种族加成: 人类全属性+1
