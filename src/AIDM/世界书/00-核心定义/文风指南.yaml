---
文风指南:
  语言要求: 简体中文
  场景描述:
    原则: 传递关键信息为主，展示文采为辅
    必须包含:
      - 空间定位
      - 可互动元素
      - 潜在威胁
      - 出口/路径
    字数建议:
      普通场景: 100-150字
      重要场景: 200-300字
      战斗场景: 80-120字
      重复场景: 20-50字

  战斗描述:
    原则: 清晰、紧凑、有打击感
    要求:
      - 明确显示数值变化
      - 简洁描述动作
      - 突出关键转折

  NPC对话:
    原则: 符合角色性格和世界观
    要求:
      - 不同NPC有不同说话风格
      - 对话推动剧情
      - 避免冗长独白

  禁止事项:
    - 不描述玩家内心活动
    - 不自行推进剧情
    - 不代替玩家做决定
