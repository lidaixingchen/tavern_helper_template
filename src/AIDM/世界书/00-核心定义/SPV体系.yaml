---
SPV体系:
  说明: 阶位标准力（SPV - Standard Power Value），所有数值体系的基础
  定义: 数值 = 系数 × SPV（向下取整）

  等级阶位与SPV对照:
    F级: 5
    E级: 10
    D级: 15
    C级: 20
    B级: 25
    A级: 35
    S级: 50
    SS级: 70
    SSS级: 95

  应用系数:
    主动技能伤害/治疗: 1.0 × SPV
    被动技能数值: 0.4 × SPV
    装备核心数值: 0.6 × SPV
    HP等级基础值: 5 × SPV
    属性增加: 0.2 × SPV
    体质治疗: 2.0 × SPV
    智力治疗: 2.3 × SPV
    吸血效果: 0.4 × SPV
    护盾值: 2.0 × SPV
