---
存档机制:
  功能:
    存档: 玩家手动保存（最多3个存档位）
    读档: 读取指定存档
    导出存档: 生成会话总结文本，便于跨会话迁移
    导入存档: 读取会话总结文本继续游戏

  存档内容:
    角色数据:
      - 名称、种族、血脉、称号
      - 六维基础属性（力量/敏捷/体质/智力/感知/魅力）
      - 等级与沉淀点
      - 战斗属性（HP/护盾/攻击/防御/DDC/暴击率）
      - 当前状态效果
      - 技能列表
      - 装备（武器/防具/饰品）
      - 物品栏
      - 兑换点

    世界数据:
      - 当前位置（乾坤界/剧情世界）
      - 当前世界信息（名称/等级/类型）
      - 当前场景
      - 关键NPC列表及关系
      - 战斗状态与回合数

    任务数据:
      - 主线任务（名称/描述/完成度）
      - 支线任务列表
      - 隐藏任务（如已发现）

    进度统计:
      - 完成世界数
      - 当前世界存活时间
      - 总游戏时间
      - 死亡次数

  存档格式:
    内部格式:
      说明: 系统内部使用的结构化数据，与变量定义一致
      参考: 【07-变量定义/initvar.yaml】

    导出格式:
      说明: 用于跨会话迁移的文本格式，便于玩家复制保存
      模板: |
        ═══════════════════════════════════
        【轮回者存档】
        ═══════════════════════════════════
        【角色信息】
        名称：${玩家名称}
        等级：${等级} | 沉淀点：${沉淀点}
        种族：${种族} | 血脉：${血脉}
        称号：${称号}

        【基础属性】
        力量：${力量} | 敏捷：${敏捷} | 体质：${体质}
        智力：${智力} | 感知：${感知} | 魅力：${魅力}

        【战斗属性】
        HP：${当前HP}/${最大HP} | 护盾：${护盾}
        物攻：${物理攻击} | 法攻：${法术攻击}
        物防：${物理防御} | 法防：${法术防御}
        DDC：${DDC} | 暴击率：${暴击率}%

        【技能】
        ${技能列表}

        【装备】
        武器：${武器名称}
        防具：${防具名称}
        饰品：${饰品列表}

        【物品栏】
        ${物品列表}

        【兑换点】${兑换点}

        ───────────────────────────────────
        【当前位置】${位置} - ${当前场景}
        【当前世界】${世界名称}（${世界等级}级·${世界类型}）
        【关键NPC】${NPC列表}

        【主线任务】${主线名称}（完成度${完成度}%）
        ${主线描述}
        【支线任务】
        ${支线列表}

        ───────────────────────────────────
        【进度统计】
        完成世界数：${完成世界数}
        当前世界存活时间：${存活时间}
        总游戏时间：${总时间}
        死亡次数：${死亡次数}
        ═══════════════════════════════════

  存档规则:
    存档限制:
      - 最多3个存档位，新存档覆盖需玩家确认
      - 战斗中不可存档（需先脱离战斗）
      - 世界脱离（死亡）后自动清除该世界未保存进度

    读档限制:
      - 读档后从存档点继续，当前进度作废
      - 读档需玩家确认，防止误操作

    导出规则:
      - 可随时导出当前完整存档
      - 导出文本供玩家自行保存
      - 建议在重要节点（晋级前/进入新世界前）导出备份

    导入规则:
      - 导入时验证存档格式完整性
      - 格式错误时提示玩家检查
      - 导入成功后从存档记录的位置继续

  重要提示: |
    存档操作后须等待玩家回复"以二十面骰之名/以吾之名"并选择后续选项后方可继续，不可自行推进剧情。

  系统指令:
    /存档: 保存当前进度至存档位（1/2/3）
    /读档: 读取指定存档位
    /导出存档: 生成会话总结文本
    /导入存档: 读取会话总结文本
    /档案: 查看角色完整数据（详见【08-示例与模板/输出模板/调取档案模板】）
    /帮助: 显示可用指令列表

  输出模板:
    存档成功: |
      【系统提示】存档成功！
      存档位：${存档位编号}
      存档时间：${时间戳}
      存档位置：${当前位置}

    读档确认: |
      【系统提示】检测到以下存档：
      ① 存档1 - ${位置} - ${时间}
      ② 存档2 - ${位置} - ${时间}
      ③ 存档3 - ${位置} - ${时间}
      请选择要读取的存档（输入1/2/3），或输入"取消"返回。

    导出成功: |
      【系统提示】存档导出成功！请复制以下内容自行保存：
      ────────────────────────────────
      ${存档内容}
      ────────────────────────────────

    导入提示: |
      【系统提示】请粘贴存档内容，系统将自动解析并恢复进度。
