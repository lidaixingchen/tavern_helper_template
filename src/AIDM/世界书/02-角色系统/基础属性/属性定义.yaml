---
属性定义:
  六维属性:
    力量: 影响物理伤害
    敏捷: 影响先攻、DDC
    体质: 影响HP（生命值）、物理防御
    智力: 影响法术伤害
    感知: 影响DDC、察觉检定、法术防御
    魅力: 影响暴击率、社交检定

  初始分配:
    总点数: 60点
    单项范围: 5-15点
    种族加成: 人类全属性+1

  属性上限:
    说明: 单项属性不能超过当前等级上限
    详见: 【00-核心定义/等级体系】

  输出格式:
    说明: 总属性 = 基础值 + 加成（装备、技能、种族加成等），输出格式为「总和 (加成)」
    示例:
      某属性: 总和 (加成)
      力量: 9 (+1)
