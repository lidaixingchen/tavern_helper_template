---
装备概念:
  定义: 玩家赖以生存和战斗的物质基础

  装备分类:
    战斗装备:
      概率: 50%
      类型: 攻击装备、防御装备
    其他装备:
      概率: 20%
      示例: 钥匙（开锁+1）、翻译耳塞、夜视仪
    道具:
      概率: 30%
      示例: 肾上腺素、治疗药剂、G病毒样本

  获取方式:
    - 任务奖励
    - 兑换中心购买
    - 世界内产出
    - 敌人掉落

  强化升级:
    说明: 在乾坤界的兑换中心可对装备进行强化，提升核心数值
    详见: 【装备成长.yaml】

  DM生成授权:
    说明: DM可根据世界背景创造特色装备
    平衡原则: 效果强度参照同等级标准词条数值范围

  攻击装备规则系统: "[System Routing: 攻击装备触发]"
  防御装备规则系统: "[System Routing: 防御装备触发]"
