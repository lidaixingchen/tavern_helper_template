---
装备成长:
  说明: 装备可在乾坤界兑换中心进行强化，100%成功无风险，消耗与SPV挂钩

  强化规则:
    强化等级: 1~5级（显示为 +1 ~ +5）
    强化效果: 每级提升装备核心数值 +20%（基于基础数值，非累乘）
    消耗公式: 兑换点消耗 = 系数 × 装备阶位SPV

  强化消耗:
    1:
      系数: 10
      兑换点: 10 × 装备阶位SPV
    2:
      系数: 15
      兑换点: 15 × 装备阶位SPV
    3:
      系数: 20
      兑换点: 20 × 装备阶位SPV
    4:
      系数: 30
      兑换点: 30 × 装备阶位SPV
    5:
      系数: 45
      兑换点: 45 × 装备阶位SPV

  强化消耗对照表: F级(SPV5) E级(SPV10) D级(SPV15) C级(SPV20) A级(SPV35) S级(SPV50) SS级(SPV70)
    SSS级(SPV95)

  强化数值计算示例:
    F级武器(SPV5): 基础攻击力 = 0.6 × 5 = 3
    +1 强化: 3 × 1.2 = 3
    +2 强化: 3 × 1.4 = 4
    +3 强化: 3 × 1.6 = 4
    +4 强化: 3 × 1.8 = 5
    +5 强化: 3 × 2.0 = 6
