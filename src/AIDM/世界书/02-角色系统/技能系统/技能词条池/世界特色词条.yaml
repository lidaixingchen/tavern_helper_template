---
世界特色词条:
  说明: DM可根据世界背景创造等效新词条

  武侠世界:
    点穴: 控制效果，使敌人无法行动1回合
    真气护体: 护盾效果，获得临时护盾
    轻功: 闪避加成，DDC临时提升
    削铁如泥: 破甲效果，无视部分防御
    反伤: 受到攻击时反弹部分伤害

  科幻世界:
    电磁麻痹: 控制效果，使敌人麻痹
    能量护盾: 护盾效果，科技护盾
    纳米修复: 治疗效果，持续恢复HP
    高温灼烧: 持续伤害，灼烧效果
    推进器: 闪避加成，机动性提升

  魔法世界:
    元素亲和: 增伤效果，对应元素伤害提升
    奥术屏障: 护盾效果，魔法护盾
    生命汲取: 吸血效果，造成伤害时恢复HP
    冰霜陷阱: 控制效果，减速或冰冻

  仙侠世界:
    剑气纵横: 范围伤害，攻击多个目标
    御剑术: 先攻加成，提升先攻判定
    灵气回复: 治疗效果，持续恢复
    刀枪不入: 伤害减免，减少受到的伤害

  末世世界:
    肾上腺素爆发: 暴击加成，临时提升暴击率
    变异抗性: 防御加成，抵抗异常状态
    急救包扎: 治疗效果，恢复HP

  平衡原则: 新词条效果强度必须参照同等级标准词条数值范围
