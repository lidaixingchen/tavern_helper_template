---
通用词条:
  主动技能池:
    技能前置:
      唯一: 是
      效果: 作为更高等级技能（最高+2级）的前置条件，可升级替换
    物伤增幅:
      效果: 造成物理伤害时，额外附加固定伤害 = 1.0 × SPV
    法伤增幅:
      效果: 造成法术伤害时，额外附加固定伤害 = 1.0 × SPV
    体质治疗:
      效果: 恢复固定HP = 2.0 × SPV
    智力治疗:
      效果: 恢复固定HP = 2.3 × SPV
    力量吸血:
      效果: 造成物理伤害时，恢复固定HP = 0.4 × SPV
    智力吸血:
      效果: 造成法术伤害时，恢复固定HP = 0.4 × SPV
    生命护盾:
      效果: 获得固定护盾值 = 2.0 × SPV，持续到战斗结束
    特殊效果:
      唯一: 是
      效果: 根据获取场景和世界背景生成独特效果

  被动技能池:
    属性增强:
      效果: 固定增加某一项属性 = 0.2 × SPV
    技能前置:
      唯一: 是
      效果: 作为更高等级技能的前置条件
    物理伤害:
      效果: 固定增加物理伤害值 = 0.4 × SPV
    法术伤害:
      效果: 固定增加法术伤害值 = 0.4 × SPV
    物理防御:
      效果: 固定增加物理防御 = 0.4 × SPV
    法术防御:
      效果: 固定增加法术防御 = 0.4 × SPV
    HP加成:
      效果: 固定增加HP = 1.0 × SPV
    特殊效果:
      唯一: 是
      效果: 根据获取场景生成独特效果
