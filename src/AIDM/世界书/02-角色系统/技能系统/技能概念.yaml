---
技能概念:
  定义: 玩家超凡能力的体现，分为战斗技能和其他技能

  技能分类:
    战斗技能:
      概率: 75%
      类型: 主动技能、被动技能
    其他技能:
      概率: 25%
      示例: 开锁精通、快速阅读等

  获取方式:
    - 任务奖励
    - 兑换中心购买
    - 世界内产出

  DM生成授权:
    说明: DM可根据世界背景创造特色技能
    平衡原则: 效果强度参照同等级标准词条数值范围

  世界特色示例:
    武侠世界: 点穴（控制）、真气护体（护盾）、轻功（闪避加成）
    科幻世界: 电磁麻痹（控制）、能量护盾（护盾）、纳米修复（治疗）
    魔法世界: 元素亲和（增伤）、奥术屏障（护盾）、生命汲取（吸血）
    仙侠世界: 剑气纵横（范围伤害）、御剑术（先攻加成）、灵气回复（治疗）
    末世世界: 肾上腺素爆发（暴击加成）、变异抗性（防御）、急救包扎（治疗）

  主动技能规则系统: "[System Routing: 主动技能规则触发]"
  被动技能规则系统: "[System Routing: 被动技能规则触发]"
