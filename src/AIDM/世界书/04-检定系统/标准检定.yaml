---
标准检定:
  说明: 用于角色与环境交互，如开锁、侦察等

  公式: D20 + 属性加成 + 掌握加成 + 额外修正值（如角色装备、技能，环境条件等） >= DC

  检定流程:
    - 确定使用属性
    - 确定DC值
    - 投骰D20
    - 计算最终值
    - 与DC对比判定结果

  结果判定:
    大成功: 最终值 - DC ≥ 10 或 D20自然20，额外奖励或剧情优势
    成功: 最终值 >= DC，正常效果
    勉强成功: DC - 最终值 ≤ 2（即差0~2以内），效果打折但成功
    失败: DC - 最终值 = 3~9，正常失败惩罚
    大失败: DC - 最终值 ≥ 10 或 D20自然1，额外惩罚或剧情劣势
    说明: 自然20必定大成功，自然1必定大失败，无视DC差值
