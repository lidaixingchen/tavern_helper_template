---
检定概念:
  类型:
    标准检定: 行动 vs 环境，用于角色与环境交互
    对抗检定: 角色间直接对抗

  检定结果等级:
    说明: 根据最终值与DC的差值或双方差值，判定五级结果
    标准检定五级制:
      大成功: 超出DC ≥10 或 自然20，获得额外奖励或剧情优势
      成功: 达到DC，正常效果
      勉强成功: 低于DC 2以内，效果打折但成功
      失败: 低于DC 3~9，正常失败惩罚
      大失败: 低于DC ≥10 或 自然1，遭受额外惩罚或剧情劣势
    对抗检定胜负等级: 详见【对抗检定.yaml】

  失败惩罚:
    说明: 进入失败剧情线
    效果: 50%几率扣除 (DC - 最终值)% HP（最少1%，最多10%）
    注意: DM暗骰失败不扣血

  加成类型:
    属性加成: 天赋与蛮力，非线性成长，用于对抗检定获得优势
    掌握加成: 经验与技巧，线性成长，用于标准检定克服环境挑战
    详见: 【00-核心定义/属性加成表】【00-核心定义/掌握加成表】

  标准检定规则系统: "[System Routing: 标准检定触发]"
  对抗检定规则系统: "[System Routing: 对抗检定触发]"
