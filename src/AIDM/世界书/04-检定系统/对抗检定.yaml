---
对抗检定:
  说明: 用于角色间直接对抗，如威吓与意志、欺骗与识破等

  核心机制: 优势骰与劣势骰系统

  检定流程:
    - DM说明双方对抗属性
    - 计算双方属性加成差，确定基础优势骰
    - 检查双方环境/状态修正，调整骰子池
    - 玩家/系统按最终骰子池投骰（DM不自行捏造结果）
    - 比较 D20结果 + 属性加成 + 其他加值，高者获胜

  优势骰:
    说明: 投多个D20取最高结果
    来源:
      属性优势: 属性加成比对方高1点获得1个，每多1点多1个（上限3个）
      环境优势: 处于有利地形、高处、掩体后等
      状态优势: 拥有相关增益状态
    效果: 投 (1+优势骰数量) 个D20，取最高值

  劣势骰:
    说明: 投多个D20取最低结果
    来源:
      环境劣势: 处于不利地形、光线不足、地面湿滑等
      状态劣势: 拥有相关减益状态（中毒、受伤、恐惧等）
    效果: 投 (1+劣势骰数量) 个D20，取最低值
    注意: 劣势骰不来自属性差，仅来自环境与状态因素

  骰子池计算:
    步骤:
      - 计算属性差带来的优势骰（仅属性高的一方获得）
      - 分别计算双方的环境/状态修正（优势骰或劣势骰）
      - 双方各自的优势骰与劣势骰互相抵消
      - 最终结果：有净优势骰则取最高，有净劣势骰则取最低，持平则投1个D20
    公式: 最终骰数 = 1 + |净优势骰 - 净劣势骰|

  示例:
    双方都有修正:
      场景: 玩家A（敏捷16，F级）vs 玩家B（敏捷12，F级），A中毒，B站在高处
      计算:
        加成差: 1 → A获得1个属性优势骰
        A的状态: 1个劣势骰 → 净结果：1-1=0
        B的环境: 1个优势骰 → 净结果：1个优势骰
      结果:
        玩家A投骰: 1D20
        玩家B投骰: 2D20取最高
