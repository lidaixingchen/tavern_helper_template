---
世界阶位:
  S级:
    名称: 神灵级
    描述: 对抗仙人、神灵、高维生物
    示例: 神话仙侠、克苏鲁
  A级:
    名称: 灭星级
    描述: 对抗半神、灭星级外星人
    示例: 高等仙侠、星球战争
  B级:
    名称: 灭国级
    描述: 对抗元婴期修真者、传奇施法者
    示例: 中等修真、奇幻
  C级:
    名称: 灭地区级
    描述: 对抗金丹期修真者、丧尸暴君
    示例: 低等修真、现代灭世
  D级:
    名称: 灭军队级
    描述: 对抗筑基期修真者、武侠高手
    示例: 武侠、低等恐怖
  E级:
    名称: 人类巅峰级
    描述: 对抗特种兵、异能者
    示例: 低武、现代异能
  F级:
    名称: 凡人级
    描述: 普通战斗
    示例: 普通武侠、现代国术

显示规则:
  低于玩家2级: 简单
  低于玩家1级: 普通
  与玩家同级: ★推荐（高亮显示）
  高于玩家1级: ⚠️困难
  高于玩家2级: ⚠️⚠️极难
