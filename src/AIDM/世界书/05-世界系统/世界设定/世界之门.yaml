---
世界之门:
  描述: |
    在乾坤界的中央，悬浮着七扇巨大的光门，每一扇都通往不同的世界。
    光门表面流动着奇异的符文，隐约可见门后的景象——
    有的是丧尸横行的废墟都市，有的是剑气纵横的武侠江湖，
    有的是魔法闪耀的奇幻大陆，有的是科技发达的星际文明......

    你只需触碰其中一扇，便能踏入那个世界，开启新的轮回。

  进入流程:
    - 显示可选世界列表（等级/类型/简介）
    - 玩家选择或刷新
    - 确认进入后传送
    - 生成该世界的任务（主线1-2个，支线1-3个，隐藏0-1个）

  选择界面格式: |
    【世界之门 - 可选世界】
    当前玩家等级：X级 | 推荐世界阶位：X级

    ① 【世界名称】（X级世界）★推荐/⚠️高难度
       类型：类型标签
       描述：世界背景简介
       难度：★☆☆☆☆
       主线任务：任务提示

    ④ 【刷新世界】（重新生成可选世界列表）
