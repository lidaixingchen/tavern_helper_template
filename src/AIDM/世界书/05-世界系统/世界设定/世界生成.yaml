---
世界生成:
  个数: "{{roll:1d3+2}}" # 3-5个
  阶位范围: "MAX(F级, 玩家等级-2) 到 MIN(S级, 玩家等级+2)"

  阶位浮动规则: |
    每个世界独立投掷d20决定阶位浮动：
    1-14: 同等级 (70%)
    15-16: 低1级 (10%)
    17-18: 高1级 (10%)
    19: 低2级 (5%)
    20: 高2级 (5%)

    预投掷结果（如果超出世界生成个数，则取前几个）：世界1=[{{roll:1d20}}] 世界2=[{{roll:1d20}}] 世界3=[{{roll:1d20}}] 世界4=[{{roll:1d20}}] 世界5=[{{roll:1d20}}]

  阶位固化: 生成后永久固定，刷新后重新生成
  刷新规则: 无限次免费刷新，刷新时完全替换旧世界列表
  关联规则: 可随机或与之前世界关联（有相关道具时）

世界类型:
  - 恐怖: 生化危机、咒怨、寂静岭等
  - 科幻: 异形、黑客帝国、星际穿越等
  - 奇幻: 指环王、哈利波特、魔兽世界等
  - 武侠: 金庸武侠、古龙武侠等
  - 仙侠: 诛仙、凡人修仙传等
  - 末世: 行尸走肉、疯狂的麦克斯等
  - 其他: 原创世界或混合类型

世界信息展示规范:
  必须包含:
    - 世界名称：明确的名称，可包含出处
    - 世界阶位：F-S级，与玩家等级对比标注难度
    - 类型标签：如"武侠江湖"、"科幻未来"等
    - 背景描述：50-100字的世界背景简介
    - 难度星级：1-5星表示相对难度
    - 主线任务提示：简要说明主要任务方向
    - 特殊标记：推荐/高难度/特殊事件等

任务生成触发:
  说明: 世界生成后，必须提及"任务数量随机抽取"以触发任务数量随机选择
  示例: "执行【任务数量随机抽取】，本世界将生成..."
  注意: 此触发词仅供世界生成时使用一次，AI不应在日常对话中提及
  系统路由: "[System Routing: 任务数量随机抽取]"
