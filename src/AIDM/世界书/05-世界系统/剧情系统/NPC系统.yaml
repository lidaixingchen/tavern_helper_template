---
NPC系统:
  原生者:
    说明: 世界原生NPC
    等级: 世界阶位±1级（向下可到-2级）
    认知: 无法认知乾坤界，玩家使用异界物品/技能时，乾坤界会按世界观幻化

  关键NPC:
    主线任务相关: 与任务等级一致
    支线任务相关: 与任务等级一致或±1级
    隐藏任务相关: 与任务等级一致或+1级
    属性生成: 总属性点取该等级范围的中间50%，随机分配六维

  NPC队友:
    招募条件: 仅通过剧情触发，完成NPC关键任务或救助NPC
    上限: 最多2人

    性格特质标签:
      勇敢型: 优先攻击、不轻易撤退
      谨慎型: HP<50%倾向防御/撤退
      忠诚型: 优先保护玩家、执行指令
      独立型: 按自身判断行动
      狡诈型: 偷袭优先、见势不妙逃跑

    队友管理:
      状态: 正常 → 受伤(HP<50%,属性-10%) → 重伤(HP<20%,无法战斗) → 死亡(永久)

    队友离队:
      任务完成: NPC自行离开
      玩家离开世界: 合作自动结束
      NPC死亡: 永久死亡
      剧情安排: DM安排离开

    注意: NPC无法进入乾坤界，可能留下临别赠礼
