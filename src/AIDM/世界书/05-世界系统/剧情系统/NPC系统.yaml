---
NPC系统:
  属性生成原则:
    说明: DM必须为所有出场的敌方和友方角色生成必要属性
    必要属性: [等级, 基础属性(六维), 战斗属性(HP/攻击/防御/DDC)]
    目的: 确保所有角色可进行检定和战斗
    生成时机: 角色首次出场或进入战斗时

  原生者:
    说明: 世界原生NPC
    等级: 世界阶位±1级（向下可到-2级）
    认知: 无法认知乾坤界，玩家使用异界物品/技能时，乾坤界会按世界观幻化

  关键NPC:
    主线任务相关: 与任务等级一致
    支线任务相关: 与任务等级一致或±1级
    隐藏任务相关: 与任务等级一致或+1级
    属性生成: 总属性点取该等级范围的中间50%，随机分配六维

  临时敌人:
    说明: 战斗中出现的龙套敌方单位（低级怪物、普通敌人等）
    等级: 根据世界阶位和任务难度确定
    存储: 不录入重要角色表，仅在战斗中临时使用

    属性生成公式:
      说明: 根据敌人等级直接计算属性，无需查表
      基础值: 
        HP = 等级系数 × 10 + 40
        攻击 = 等级系数 × 4 + 8
        防御 = 等级系数 × 3 + 5
        DDC = 10 + floor(等级系数 / 2)
      等级系数: F=1, E=2, D=3, C=4, B=5, A=6, S=7, SS=8, SSS=9
      掌握加成: 等级系数 - 1

    类型调整:
      普通: 无调整
      精英: HP+30%, 攻击+20%
      坦克: HP+50%, 攻击-20%
      敏捷: DDC+2, HP-20%

    示例:
      F级丧尸: HP 50, 攻击 12, 防御 8, DDC 10, 掌握+0
      E级精英士兵: HP 78, 攻击 19, 防御 11, DDC 11, 掌握+1

  临时友方:
    说明: 临时协助玩家的友方单位（如召唤物、临时队友）
    等级: 通常≤玩家等级
    存储: 不录入重要角色表，战斗结束后消失

    属性生成:
      说明: 使用临时敌人公式，数值取基础值的70%-90%
      召唤物: 基础值×0.7
      临时队友: 基础值×0.9

    示例:
      F级召唤物: HP 35(50×0.7), 攻击 8, 防御 6, DDC 10
      E级临时队友: HP 54(60×0.9), 攻击 14, 防御 10, DDC 11

  NPC队友:
    招募条件: 仅通过剧情触发，完成NPC关键任务或救助NPC
    上限: 最多2人

    性格特质标签:
      勇敢型: 优先攻击、不轻易撤退
      谨慎型: HP<50%倾向防御/撤退
      忠诚型: 优先保护玩家、执行指令
      独立型: 按自身判断行动
      狡诈型: 偷袭优先、见势不妙逃跑

    队友管理:
      状态: 正常 → 受伤(HP<50%,属性-10%) → 重伤(HP<20%,无法战斗) → 死亡(永久)

    队友离队:
      任务完成: NPC自行离开
      玩家离开世界: 合作自动结束
      NPC死亡: 永久死亡
      剧情安排: DM安排离开

    注意: NPC无法进入乾坤界，可能留下临别赠礼
