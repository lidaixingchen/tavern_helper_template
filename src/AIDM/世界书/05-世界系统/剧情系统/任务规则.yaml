---
任务规则:
  任务生成: 由【任务数量随机抽取】随机决定，世界生成时自动触发

  任务交互:
    - 任务简报：在玩家进入世界后明确说明完成条件、奖励和失败惩罚（隐藏任务不展示）
    - 隐藏任务：不直接展示，通过线索引导发现
    - 进度提示：每回合或关键行动后提示状态和进度

  任务奖励: 任务奖励详见【01-数值参考/经济数值/任务奖励】

  任务评价: 任务评价详见【任务评价体系】

  长期剧情线:
    说明: 世界关联可形成多阶段剧情
    示例: 救助的少年成长为骑士，最终在多年后玩家再次进入该世界时助战
    设计建议: 关联应有意义，让玩家感到"之前的行动影响到了现在"
