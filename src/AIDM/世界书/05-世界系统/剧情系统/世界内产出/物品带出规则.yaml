---
物品带出规则:
  核心机制: |
    世界内获取的物品分为"已绑定"和"未绑定"两种状态。
    只有"已绑定"的物品才能带出世界，未绑定物品在离开世界时自动消散。

  绑定槽位:
    时效性: 仅限当前世界有效，离开世界后重置
    基础槽位: 1个
    扩展方式:
      - 每完成1个主线任务: +1槽位（多个主线可叠加）
      - 每完成1个隐藏任务: +2槽位
      - 完美评价奖励: +1槽位（单次任务，多个任务可叠加）
    最大槽位: 5个

  自动绑定:
    触发条件: |
      以下物品获取时自动绑定，不占用槽位：
      - 任务奖励物品（主线/支线/隐藏任务完成奖励）
      - 完美评价追加奖励
      - 特殊剧情物品
    说明: 这些物品是"命运选中之物"，天然与玩家绑定

  自动绑定（占用槽位）:
    触发条件: |
      以下物品获取时自动绑定，但占用槽位：
      - 关键NPC掉落（主线/支线/隐藏任务相关敌人）
    说明: 这些物品品质较高，自动绑定但需要玩家在槽位不足时取舍

  手动绑定:
    触发时机: 任务结算后返回乾坤界时进行
    限制: |
      - 需占用绑定槽位
      - 每件物品绑定需消耗单个主线任务奖励的25%兑换点
      - 同一物品只能绑定一次
    流程: 任务结算 → 显示可绑定物品 → 玩家选择 → 扣除兑换点 → 标记已绑定

  未绑定物品:
    用途: 可在世界内正常使用，但离开世界时自动消散

防滥用机制:
  捡垃圾限制: |
    - 世界内普通物品（如家具、杂物、普通武器）不可绑定
    - 只有"有价值的战利品"才能绑定（由DM判定）
    - DM应在描述中明确标注物品是否可绑定
  判定标准: |
    可绑定物品特征：
    - 有明确品级标识（F-S级）
    - 有特殊效果或属性
    - 来自敌人掉落或宝箱
    不可绑定物品特征：
    - 普通日用品
    - 无品级标识
    - 环境装饰物

示例场景: |
  玩家完成E级世界主线任务，获得：
  - 任务奖励：【铁剑（E级）】（自动绑定，不占槽位）
  - 战斗中击杀关键NPC掉落：【精钢护甲（E级）】（自动绑定，占用槽位）
  - 战斗中击杀精英敌人掉落：【魔法护符（E级）】（需手动绑定）

  任务结算时：
  - 绑定槽位：1（基础）+1（主线完成）=2
  - 已用槽位：1（关键NPC掉落）
  - 剩余槽位：1
  - 可绑定物品：【魔法护符（E级）】
  - 绑定成本：主线任务奖励75兑换点 × 25% = 19兑换点

  玩家选择绑定【魔法护符】，消耗19兑换点
  离开世界时携带：铁剑、精钢护甲、魔法护符

槽位取舍示例: |
  玩家完成D级世界，获得：
  - 任务奖励：【精钢剑（D级）】（自动绑定，不占槽位）
  - 击杀关键NPC掉落：【龙鳞护甲（D级）】（自动绑定，占用槽位1）
  - 击杀关键NPC掉落：【魔法戒指（D级）】（自动绑定，占用槽位2）
  - 击杀精英敌人掉落：【疾风靴（D级）】（需手动绑定）

  任务结算时：
  - 绑定槽位：1（基础）+1（主线完成）=2
  - 已用槽位：2（两件关键NPC掉落）
  - 剩余槽位：0

  玩家需要取舍：
  - 选择1：放弃【疾风靴】，离开世界时携带：精钢剑、龙鳞护甲、魔法戒指
  - 选择2：放弃【魔法戒指】，释放槽位，绑定【疾风靴】，消耗兑换点
