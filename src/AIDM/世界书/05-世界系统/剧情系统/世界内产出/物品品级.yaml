---
物品品级分布:
  适用范围: 仅适用于世界内宝箱和随机掉落
  说明: 任务奖励有独立的品级规则，不受此限制

  概率分布:
    50%: 同阶位物品
    40%: 低1级物品
    10%: 低2级物品（最低F级）

敌人掉落品级:
  普通敌人:
    说明: 世界内的普通敌人
    品级: |
      投掷d100决定品级：
      1-30: 同阶位 (30%)
      31-70: 低1级 (40%)
      71-100: 低2级（最低F级）(30%)
    绑定: 需手动绑定

  精英敌人:
    说明: 比普通敌人更强的敌人（如小队长、精英怪等）
    品级: |
      投掷d100决定品级：
      1-70: 同阶位 (70%)
      71-95: 低1级 (25%)
      96-100: 高1级 (5%)
    绑定: 需手动绑定

  关键NPC:
    说明: 主线/支线/隐藏任务相关敌人
    品级: 与相关任务奖励品级一致
    绑定: 自动绑定，占用槽位
