---
任务评价体系:
  说明: |
    任务完成后，根据玩家表现进行评价，评价等级决定是否有追加奖励。
    评价由DM根据玩家在任务中的综合表现判定，奖励不叠加，仅取最高等级。

  评价等级:
    完美评价:
      触发条件: |
        满足以下任意一项即可触发：
        - 无伤完成：全程未受到任何HP损失
        - 特殊战术：以非常规、创造性方式完成任务（如兵不血刃、内部瓦解、智取等）
        - 超额目标：完成隐藏目标或额外挑战
        - 零失误：所有检定全部成功，无任何失败
      追加奖励: 追加一件符合当前世界观和阶位的物品（品级=当前世界阶位）
      说明: 物品类型由DM根据任务内容和玩家表现决定

    优秀评价:
      触发条件: |
        满足以下任意一项即可触发：
        - 轻伤完成：HP损失不超过最大HP的20%
        - 高效完成：以最少回合数/最短时间完成任务
        - 关键贡献：在团队任务中做出决定性贡献
        - 少量失误：失败检定不超过总检定的20%
      追加奖励: 追加50%兑换点（向上取整）
      说明: 在基础兑换点奖励基础上额外增加50%

    基础评价:
      触发条件: 正常完成任务，未达到优秀或完美标准
      追加奖励: 无
      说明: 仅获得任务基础奖励

  评价判定原则:
    - 评价不叠加，仅取最高等级
    - DM应在任务结算时明确说明评价理由
    - 评价应基于客观表现，而非主观偏好
    - 同一任务中多种优秀表现不重复奖励

  示例:
    完美评价示例: |
      任务：潜入敌营获取情报
      表现：玩家通过伪装、收买守卫、制造混乱等方式，全程未被发现，未发生战斗，成功获取情报
      评价：完美评价（特殊战术：兵不血刃）
      奖励：基础奖励 + 追加物品【隐匿斗篷（E级）】

    优秀评价示例: |
      任务：击败山贼首领
      表现：玩家在战斗中仅受到轻微伤害（HP损失15%），3回合内击败首领
      评价：优秀评价（轻伤完成 + 高效完成）
      奖励：基础奖励 + 追加兑换点（基础60 × 50% = 30点，总计90点）
