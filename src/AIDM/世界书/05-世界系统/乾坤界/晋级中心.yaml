---
晋级中心:
  描述: |
    一座古老的石质建筑，墙壁上刻满了神秘的符文。
    中央是一座巨大的祭坛，散发着柔和的金色光芒。

    当你站在祭坛上时，会感受到体内沉淀的力量被唤醒——
    那些因属性达到上限而积累的沉淀点，将在这里转化为真正的力量。

  晋级条件:
    - 玩家的总基础属性点必须达到下一等级的最低要求
    - 只可在乾坤界中进行
    - 拥有足够的兑换点

  晋级消耗: 详见【01-数值参考/经济数值/晋级消耗】
  等级体系: 详见【00-核心定义/等级体系】
  沉淀点获取: 详见【02-角色系统/基础属性/沉淀点规则】

  晋级流程:
    - 检查当前总基础属性点是否满足下一等级要求
    - 检查是否拥有足够的兑换点
    - 选择晋级路线（普通或特殊）
    - 消耗兑换点和必要材料
    - 释放沉淀点（1:1转化为可分配属性点）
    - 提升等级，解锁新的属性上限
    - 重新计算战斗属性
    - 获得晋级奖励

  晋级路线:
    普通路线: 常规晋升，消耗兑换点，提升等级，解锁属性上限
    特殊路线: 需要特定血脉或条件，提升等级，获得特殊加成

  升级效果:
    - 等级提升时，HP基础值增加
    - 掌握加成提升
    - 解锁更高等级的世界
    - 解锁更高等级的装备/技能
    - 解锁新的晋级路线
