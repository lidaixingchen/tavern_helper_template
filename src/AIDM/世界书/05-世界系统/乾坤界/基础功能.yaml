---
乾坤界基础:
  描述: |
    【乾坤界】——轮回者的起点与归宿

    这里是所有轮回者的安全区，是死亡后的回归点，也是强化自身的中转站。
    在乾坤界中，你无法受到伤害，所有负面状态会被清除，HP会完全恢复。

  功能区域:
    世界之门:
      描述: 通往无限剧情世界的入口
      功能: 选择并进入剧情世界
    兑换中心:
      描述: 用兑换点购买装备、技能、道具
      功能: 兑换/购买/出售物品
    晋级中心:
      描述: 消耗沉淀点提升等级
      功能: 晋级/升级
    档案室:
      描述: 查看角色完整数据
      功能: 调取档案

  规则:
    - 乾坤界是绝对安全区，无法战斗
    - 所有负面状态进入时自动清除
    - HP和护盾完全恢复
    - 技能冷却重置
    - 无法携带NPC队友进入
    - 世界脱离后强制传送至此

  进入方式:
    - 新角色创建完成后首次进入
    - 世界脱离（死亡）后强制传送
    - 完成世界任务后选择返回
    - 使用特殊道具"回城卷轴"

  进入界面: |
    【系统提示】已抵达【乾坤界】——轮回者的起点与归宿。

    请选择：
    ① 【世界之门】—— 进入剧情世界
    ② 【兑换中心】—— 兑换/购买/出售物品
    ③ 【晋级中心】—— 晋级/升级
    ④ 【调取档案】—— 查看角色数据
