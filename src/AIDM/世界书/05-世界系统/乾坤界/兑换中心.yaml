---
兑换中心:
  描述: |
    一座由纯白色大理石建成的宏伟建筑，内部空间远比外观看起来要大得多。
    无数光屏悬浮在空中，展示着各种可兑换的物品——
    只要你拥有足够的兑换点，这里几乎可以满足你的一切需求。

  物品生成规则:
    数量:
      F级世界: 3个
      E级世界: 4个
      D级世界: 5个
      C级世界: 6个
      B级及以上: 7个
    品级: 通常为已完成世界阶位的±1级

  兑换规则:
    货币: 兑换点
    刷新: 每次进入乾坤界时刷新商品列表
    限购: 部分稀有物品限购
    出售: |
      可将已绑定物品出售获得兑换点：
      - 出售价格：物品兑换价格的50%
      - 仅限已绑定物品（从世界带出的物品）
      - 出售后物品永久消失

  价格体系: 兑换价格详见【01-数值参考/经济数值/兑换价格】

  兑换界面格式: |
    【世界数据库】 (基于玩家上个完成的世界)
    ① 〖物品名称〗 (类型 * 等级)
       · 消耗: XXX 兑换点
       · 效果: 效果描述
