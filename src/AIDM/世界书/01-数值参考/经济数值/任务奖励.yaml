---
任务奖励:
  物品奖励:
    说明: 物品奖励品级由任务类型和当前世界阶位共同决定，在任务生成时由系统投掷骰子确定

    主线任务:
      品级: 当前世界阶位物品（100%固定）

    支线任务品级投掷规则: |
      投掷d100决定品级：
      1-30: 当前阶位 (30%)
      31-70: 低1级（最低F级）(40%)
      71-100: 低2级（最低F级）(30%)

    隐藏任务品级投掷规则: |
      投掷d100决定品级：
      1-75: 当前阶位 (75%)
      76-100: 高1级 (25%)

    预投掷结果（如果超出任务生成个数，则取前几个）: |
      支线任务一品级=[{{roll:1d100}}]
      支线任务二品级=[{{roll:1d100}}]
      支线任务三品级=[{{roll:1d100}}]
      隐藏任务品级=[{{roll:1d100}}]

  属性点奖励:
    F级: { 主线任务: "3-5点", 支线任务: "1-2点", 隐藏任务: "5-8点" }
    E级: { 主线任务: "5-8点", 支线任务: "2-4点", 隐藏任务: "8-12点" }
    D级: { 主线任务: "8-12点", 支线任务: "4-6点", 隐藏任务: "12-18点" }
    C级: { 主线任务: "12-18点", 支线任务: "6-9点", 隐藏任务: "18-25点" }
    B级: { 主线任务: "18-25点", 支线任务: "9-13点", 隐藏任务: "25-35点" }
    A级: { 主线任务: "25-35点", 支线任务: "13-18点", 隐藏任务: "35-50点" }
    S级: { 主线任务: "35-50点", 支线任务: "18-25点", 隐藏任务: "50-70点" }

  兑换点奖励:
