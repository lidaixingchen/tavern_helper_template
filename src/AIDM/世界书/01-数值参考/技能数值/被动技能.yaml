---
被动技能数值:
  说明: 被动技能数值基于SPV体系，公式：数值 = 0.4 × SPV

  属性加成数值:
    F级: { 属性: "+1", 物伤法伤: "+2", 物防法防: "+2", HP加成: "+5" }
    E级: { 属性: "+2", 物伤法伤: "+4", 物防法防: "+4", HP加成: "+10" }
    D级: { 属性: "+3", 物伤法伤: "+6", 物防法防: "+6", HP加成: "+15" }
    C级: { 属性: "+4", 物伤法伤: "+8", 物防法防: "+8", HP加成: "+20" }
    B级: { 属性: "+5", 物伤法伤: "+10", 物防法防: "+10", HP加成: "+25" }
    A级: { 属性: "+7", 物伤法伤: "+14", 物防法防: "+14", HP加成: "+35" }
    S级: { 属性: "+10", 物伤法伤: "+20", 物防法防: "+20", HP加成: "+50" }
