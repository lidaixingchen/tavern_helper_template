---
武器数值:
  说明: 武器数值基于SPV体系（阶位标准力），公式：数值 = 0.6 × SPV

  攻击装备数值:
    F级: { 属性加成: "+1", 物伤法伤: "+3" }
    E级: { 属性加成: "+2", 物伤法伤: "+6" }
    D级: { 属性加成: "+3", 物伤法伤: "+9" }
    C级: { 属性加成: "+4", 物伤法伤: "+12" }
    B级: { 属性加成: "+5", 物伤法伤: "+15" }
    A级: { 属性加成: "+7", 物伤法伤: "+21" }
    S级: { 属性加成: "+10", 物伤法伤: "+30" }

  词条数量:
    F级: 1项
    E级: 2项
    D级: 3项
    C级: 4项
    B级及以上: 5项
