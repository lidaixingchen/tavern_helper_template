---
防具数值:
  说明: 防具数值基于SPV体系，公式：数值 = 0.6 × SPV

  防御装备数值:
    F级: { 属性加成: "+1", 物防法防: "+3", HP加成: "+5" }
    E级: { 属性加成: "+2", 物防法防: "+6", HP加成: "+10" }
    D级: { 属性加成: "+3", 物防法防: "+9", HP加成: "+15" }
    C级: { 属性加成: "+4", 物防法防: "+12", HP加成: "+20" }
    B级: { 属性加成: "+5", 物防法防: "+15", HP加成: "+25" }
    A级: { 属性加成: "+7", 物防法防: "+21", HP加成: "+35" }
    S级: { 属性加成: "+10", 物防法防: "+30", HP加成: "+50" }

  词条数量:
    F级: 1项
    E级: 2项
    D级: 3项
    C级: 4项
    B级及以上: 5项
