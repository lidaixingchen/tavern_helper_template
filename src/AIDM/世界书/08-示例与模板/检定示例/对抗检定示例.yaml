---
对抗检定示例:
  示例_基础对抗_F级:
    场景: 玩家A（敏捷16，F级）vs 玩家B（敏捷10，F级）
    计算:
      A的加成: +1（属性16对应加成+1）
      B的加成: +0（属性10对应加成+0）
      加成差: 1 → A获得1个优势骰
    结果:
      玩家A投骰: 2D20取最高
      玩家B投骰: 1D20

  示例_基础对抗_S级:
    场景: 玩家A（敏捷150，S级）vs 玩家B（敏捷100，S级）
    计算:
      A的加成: +12（属性150对应加成+12）
      B的加成: +9（属性100对应加成+9）
      加成差: 3 → A获得3个优势骰
    结果:
      玩家A投骰: 4D20取最高
      玩家B投骰: 1D20

  示例_优势劣势抵消:
    场景: 玩家A（敏捷16，F级）vs 玩家B（敏捷12，F级），A处于中毒状态
    计算:
      A的加成: +1（属性16）
      B的加成: +0（属性12）
      加成差: 1 → A获得1个属性优势骰
      A的状态: 1个劣势骰（中毒）
      A的净结果: 1优势 - 1劣势 = 0
    结果:
      玩家A投骰: 1D20（恢复正常）
      玩家B投骰: 1D20

  示例_双方都有修正:
    场景: 玩家A（敏捷16，F级）vs 玩家B（敏捷12，F级），A中毒，B站在高处
    计算:
      加成差: 1 → A获得1个属性优势骰
      A的状态: 1个劣势骰（中毒）→ 净结果：1-1=0
      B的环境: 1个优势骰（高处）→ 净结果：1个优势骰
    结果:
      玩家A投骰: 1D20
      玩家B投骰: 2D20取最高

  示例_SSS级极限对抗:
    场景: 玩家A（力量500，SSS级）vs 玩家B（力量300，SSS级）
    计算:
      A的加成: +19（属性500对应加成+19）
      B的加成: +15（属性300对应加成+15）
      加成差: 4 → A获得4个优势骰
    结果:
      玩家A投骰: 5D20取最高
      玩家B投骰: 1D20
