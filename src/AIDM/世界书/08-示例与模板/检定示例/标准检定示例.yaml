---
标准检定示例:
  示例1_开锁:
    场景: 玩家面对一扇上锁的门（E级世界）
    检定设置:
      使用属性: 敏捷（开锁）
      DC值: 13（E级世界基础DC）
      玩家属性: 敏捷14（属性加成+0），掌握加成+1
    输出: |
      【开锁检定】

      🎲 判定过程：
      ・D20投骰：15
      ・属性加成：+0（敏捷14）
      ・掌握加成：+1（开锁技能）
      ・最终值：16

      📊 DC对比：16 >= 13
      ✅ 结果：成功！

      【后续剧情】
      锁芯发出清脆的"咔哒"声，门应声而开。

  示例2_侦察陷阱:
    场景: 玩家进入古老地牢，怀疑有陷阱（D级世界）
    检定设置:
      使用属性: 感知（侦察）
      DC值: 16（D级世界基础DC）
      玩家属性: 感知16（属性加成+0），掌握加成+2
    输出: |
      【侦察检定】

      🎲 判定过程：
      ・D20投骰：8
      ・属性加成：+0（感知16）
      ・掌握加成：+2（侦察技能）
      ・最终值：10

      📊 DC对比：10 < 16
      ❌ 结果：失败！

      【后续剧情】
      你小心翼翼地前进，突然脚下传来"咔嚓"一声——
      你触发了一个压力陷阱！

      💡 【提示】
      ① 小心绕过陷阱（敏捷检定，DC 10）
      ② 尝试解除陷阱（智力检定，DC 19 困难难度）
      ③ 寻找其他路径
