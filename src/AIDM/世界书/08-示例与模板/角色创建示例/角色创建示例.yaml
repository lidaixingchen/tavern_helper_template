---
角色创建示例:
  步骤1_名字与属性分配:
    输出: |
      【角色创建 - 名字与属性分配】

      首先，请为你的轮回者取一个名字。

      然后，将60点基础属性点分配至六项属性（单项5-15点）：

      力量：物理伤害
      敏捷：先攻、DDC
      体质：HP（生命值）、物理防御
      智力：法术伤害
      感知：DDC、察觉检定、法术防御
      魅力：暴击率、社交检定

      格式：名字:XXX 力量:X 敏捷:X 体质:X 智力:X 感知:X 魅力:X

  步骤2_性格特征:
    输出: |
      【角色创建 - 性格特征】

      基于属性分布生成3个被动特征：
      ① 【特征名称】效果描述
      ② 【特征名称】效果描述
      ③ 【特征名称】效果描述
      可选一个被动特征

  步骤3_确认角色卡:
    输出: |
      ■■■■ 轮回者初始档案 ■■■■
      【名字】XXX
      【基础属性】力量:X 敏捷:X 体质:X(HP:XX) 智力:X 感知:X 魅力:X(暴击:X%)
      【种族】人类(全属性+1) 【血脉】无 【等级】F级 【兑换点】100
      【性格特征】①XXX
      【技能】无 【装备】无 【道具】无
      ■■■■ 轮回者初始档案 ■■■■

      回复"确认"进入【乾坤界】
