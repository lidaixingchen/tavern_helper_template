---
控制效果:
  眩晕:
    效果: 跳过下一回合，无法行动
    持续: 1回合
    解除: 自动恢复
  冰冻:
    效果: 无法行动，受到伤害×1.5倍
    持续: 2回合
    解除: 受到火焰伤害或等待融化
  恐惧:
    效果: 每回合需意志检定（DC12），失败则逃跑
    检定: D20 + 感知属性加成 + 掌握加成
    持续: 2-4回合
    解除: 意志检定成功或队友安抚
  受困:
    效果: 无法移动，DDC-2
    持续: 1-2回合
    解除: 力量检定挣脱或外力解救
  击倒:
    效果: 需消耗回合起身，起身前DDC-5
    持续: 直到起身
    解除: 消耗回合起身
