---
状态规则:
  叠加规则:
    同类型负面: 不叠加，取最高效果
    同类型正面: 可叠加，但同类护盾不叠加（取最高值）
    正负抵消: 同时有+5伤害和-5伤害时，效果抵消
    持续时间: 独立计算，新状态不刷新旧状态持续时间

  状态强度等级:
    弱效:
      持续伤害: 3%最大HP/回合
      护盾值: 15%施法者最大HP
      属性增益: "+20%"
      伤害增减: "+20%/-20%"
    中效:
      持续伤害: 4%最大HP/回合
      护盾值: 20%施法者最大HP
      属性增益: "+25%"
      伤害增减: "+30%/-30%"
    强效:
      持续伤害: 5%最大HP/回合
      护盾值: 30%施法者最大HP
      属性增益: "+30%"
      伤害增减: "+50%/-40%"

  持续伤害状态详情: "[System Routing: 持续伤害状态触发]"
  控制效果详情: "[System Routing: 控制效果触发]"
  减益效果详情: "[System Routing: 减益效果触发]"
  增益效果详情: "[System Routing: 增益效果触发]"
  防护效果详情: "[System Routing: 防护效果触发]"
