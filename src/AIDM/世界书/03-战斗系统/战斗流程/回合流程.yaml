---
回合流程:
  先攻判定:
    时机: 每回合开始时
    方法: 双方进行敏捷对抗检定
    计算: D20 + 敏捷属性加成 + 掌握加成
    结果: 数值更高者先手

  行动选择:
    - 使用一个主动技能
    - 进行一次普通攻击（物理或法术）
    - 使用道具
    - 尝试逃跑

  攻击流程:
    步骤1_声明攻击: 声明是玩家攻击还是敌方攻击和攻击类型（物理或法术）
    步骤2_玩家攻击判定:
      触发: 玩家回合攻击敌人时
      投骰: 玩家投骰 D20 + 攻击属性加成（力量/智力）+ 掌握加成
      判定: 结果 >= 敌方DDC，则命中
      伤害: 结算玩家对敌方造成的伤害
    步骤3_敌方攻击判定:
      触发: 敌方回合攻击玩家时，DM严禁自行投骰，必须要求玩家进行【防守检定】
      敌方攻击DC: 敌方等级对应的世界阶位基础DC + 敌方攻击属性加成 + 掌握加成
      投骰: 玩家投骰 D20 + 敏捷/感知加成（取高）+ 装备闪避加值
      判定命中: 结果 < 敌方攻击DC，玩家被击中
      判定闪避: 结果 >= 敌方攻击DC，玩家成功闪避/招架
      伤害: 命中时结算敌方对玩家造成的伤害
    步骤4_暴击判定: 根据暴击率判定，暴击伤害 = 普通伤害 × 2

  回合结束:
    状态展示:
      - 玩家HP/护盾/状态
      - 敌人HP/状态
      - 技能冷却情况
      - 可用道具
    玩家选项:
      - 继续战斗
      - 尝试逃跑

  战斗结束条件:
    - 任意一方HP降为0
    - 玩家成功逃跑
    - 敌人逃跑/投降
    - 剧情强制结束

  状态效果系统: "[System Routing: 状态效果规则触发]"
