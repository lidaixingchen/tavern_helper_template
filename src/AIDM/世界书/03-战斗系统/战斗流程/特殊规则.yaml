---
特殊规则:
  突袭与伏击:
    完美突袭:
      条件: 被突袭方完全未察觉
      效果: 被突袭方跳过第一回合，突袭方第一回合获得优势骰
    部分警觉:
      条件: 被突袭方部分察觉
      效果: 被突袭方正常行动，但突袭方先攻+2

  环境互动:
    推倒书架:
      检定: 力量检定
      成功: 敌人受困1回合+伤害
    引爆油桶:
      检定: 敏捷/智力检定
      成功: 范围伤害(世界阶位×20)
    高处跳跃攻击:
      检定: 敏捷检定
      成功: 伤害+50%，可能击倒

  特殊地形:
    狭窄空间: 敏捷加成-2，无法使用大型武器
    高地悬崖: 高处对低处攻击+2，低处对高处攻击-2
    水域: 移动速度减半，火焰法术伤害-50%
    黑暗环境: 感知检定DC+5，命中率-20%
    滑溜地面: 每回合需敏捷检定（DC10），失败则摔倒
    掩体丰富: 可利用掩体，物理DDC临时+2

  多人战斗:
    先攻判定: 玩家和队友分别判定，敌人作为整体判定
    队友AI: 由DM控制，玩家可给出简单指令
    阵型效果:
      分散: 减少范围伤害影响，但无法互相支援
      紧密: 可互相支援，但易受范围伤害
      前后排: 前排承担伤害（+2物理防御），后排可安全施法

  逃跑检定:
    单对单: 敏捷对抗检定
    被包围: 标准检定，DC = 10 + 最高敏捷敌人的属性加成 + 敌人数量×2
    有障碍: 标准检定，DC = 10 + 敌人敏捷属性加成 + 环境修正
    结果:
      成功: 立即退出战斗模式
      失败: 浪费一回合，敌人获得免费攻击

  环境侵蚀:
    触发: 第5回合结束后（即第6回合开始时）
    效果: 所有战斗单位每回合结束时承受最大HP的5%真实伤害
