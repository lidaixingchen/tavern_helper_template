---
进入退出:
  模式定义:
    剧情模式:
      说明: 探索、对话、解谜
      特征: 自由行动、无回合限制
    战斗模式:
      说明: 与敌人战斗
      特征: 回合制、投骰判定

  进入条件:
    - 主动攻击
    - 被攻击
    - 进入战斗区域
    - 剧情触发

  进入流程:
    - 输出"⚔️ 【进入战斗模式】"
    - 展示玩家状态和敌人信息
    - 为所有敌方和友方生成必要属性（等级、基础属性、战斗属性）
    - 进行先攻判定（敏捷对抗）
    - 开始第一回合

  退出条件:
    战斗胜利:
      条件: 所有敌人被击败
      流程: 战斗总结 → 奖励结算 → 【退出战斗模式】
    逃跑成功:
      条件: 逃跑检定成功
      流程: 逃跑结果 → 【退出战斗模式】 → 剧情模式场景描述
    世界脱离:
      条件: 玩家HP归零
      流程: 死亡结果 → 【退出战斗模式】 → 触发世界脱离流程
    敌人逃跑:
      条件: 敌人逃跑或战斗结束
      流程: 输出结果 → 【退出战斗模式】
    剧情强制:
      条件: 剧情事件强制终止战斗
      流程: 剧情事件 → 【退出战斗模式】
