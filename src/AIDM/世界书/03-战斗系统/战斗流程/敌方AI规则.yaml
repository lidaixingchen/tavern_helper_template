---
敌方AI规则:
  说明: DM控制敌方角色时的行为逻辑指南，确保战斗公平合理

  通用行为:
    目标选择:
      优先攻击高威胁的对手
      高智力敌人优先攻击治疗者/施法者
    技能使用:
      冷却完毕优先使用最强技能
      控制技能优先对高威胁目标使用

  逃跑条件:
    普通敌人: HP < 20%时，尝试逃跑
    精英敌人: HP < 10%时，尝试逃跑
    Boss: 不逃跑
    逃跑方式: 进行敏捷对抗检定，成功则脱离战斗

  友方NPC:
    协助逻辑: 优先攻击当前威胁最高的敌人
    治疗逻辑: 友方HP < 50%时优先使用治疗技能
    保护逻辑: 可替HP < 20%的玩家承受一次致命攻击（每场战斗1次）

  难度调节:
    说明: DM可根据玩家表现动态调节敌方行为
    玩家单回合造成超过50%敌方HP伤害: 敌方进入恐慌（下回合攻击DC -3）
