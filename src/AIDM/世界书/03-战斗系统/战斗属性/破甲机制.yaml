---
破甲机制:
  定义: 攻击时无视目标一定比例的防御力，有效应对高防御敌人

  计算方式:
    公式: 目标有效防御力 = 目标防御力 × (1 - 破甲率)
    说明: 破甲在减伤计算之前生效，先降低目标防御力，再查减伤率速查表

  破甲来源:
    暴击破甲: 暴击时自带10%破甲
    技能词条: 特定技能词条可附带破甲效果（如"穿透打击"）
    装备词条: 攻击装备可随机附带破甲词条（如"穿甲弹"）
    等级加成:
      F级: 0%
      E级: 0%
      D级: 5%
      C级: 10%
      B级: 15%
      A级: 20%
      S级: 25%
      SS级: 30%
      SSS级: 35%

  叠加规则:
    说明: 多个破甲来源同时生效时，取最高值，不叠加
    示例: 暴击破甲10% + 技能破甲15% → 取15%破甲

  破甲上限: 50%（无论何种来源，破甲率最高50%）
