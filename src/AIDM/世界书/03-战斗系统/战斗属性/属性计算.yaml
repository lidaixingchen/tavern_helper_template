---
属性计算:
  HP:
    公式: 体质×5 + 等级基础值 + 装备HP加成 + 技能HP加成
    等级基础值: 详见【01-数值参考/战斗数值/HP基础值】
    说明: HP归零触发世界脱离

  物理攻击:
    公式: 力量 + 武器伤害 + 技能伤害加成
    说明: 基础物理攻击力

  法术攻击:
    公式: 智力 + 武器法伤加成 + 技能伤害加成
    说明: 基础法术攻击力

  物理防御:
    公式: 体质 + 防具防御 + 技能防御加成
    说明: 减免物理伤害（直接减伤）

  法术防御:
    公式: 感知 + 防具法防加成 + 技能防御加成
    说明: 减免法术伤害（直接减伤）

  DDC:
    公式: 10 + 敏捷/感知属性加成（取高）+ 装备闪避加值
    说明: 动态防御等级，闪避/抵抗攻击的难度

  暴击率:
    公式: 5% + (魅力/2)%
    上限: 50%
    说明: 暴击伤害固定为2倍
