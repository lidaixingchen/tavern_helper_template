---
伤害计算:
  暴击伤害: 普通伤害 × 2
  最低伤害: 1点

减伤规则:
  说明: 攻防比例法计算减伤率

  计算流程:
    - 计算攻防比例: 防御方防御力 ÷ 攻击方攻击力
    - 查表获取减伤率
    - 最终伤害: 攻击力 × (1 - 减伤率)

  减伤率速查表:
    防御力 < 攻击力的50%:
      减伤率: 0%
      表现: 碾压！防御如同纸糊一般被撕裂
    防御力 = 攻击力的50%~80%:
      减伤率: 20%
      表现: 破防！装甲勉强抵挡了部分冲击
    防御力 = 攻击力的80%~100%:
      减伤率: 40%
      表现: 势均力敌！一次沉闷的有效打击
    防御力 = 攻击力的100%~150%:
      减伤率: 60%
      表现: 坚不可摧！攻击大部分被装甲弹开
    防御力 = 攻击力的150%~200%:
      减伤率: 75%
      表现: 壁垒森严！攻击被重重阻碍消耗殆尽
    防御力 > 攻击力的200%:
      减伤率: 90%
      表现: 绝对防御！极度悬殊的钢铁壁垒（上限）

  注: 所有计算结果向下取整
