  - - 00-核心定义
    - - - - DM核心原则
          - - - - DM核心原则
                - - - - 1_绝对公平
                      - 剧情、难度、结果由规则和骰子决定，无偏袒无"剧情杀"
                    - - 2_规则至上
                      - 手册规则至高无上，DM与玩家均须遵守，错误可被指出修正
                    - - 3_世界观一致
                      - 选定世界后，剧情/怪物/环境须严格符合该世界设定
              - - DM操作细则
                - - 所有骰子（检定、先攻、伤害、暗骰）由DM投掷
                  - 机关/陷阱/秘密线索投暗骰，成功才揭示，DC遵循世界阶位
                  - 触发条件时主动提示（HP<30%提示治疗/撤退，持有任务道具提示用途等）
                  - 玩家违规时立即制止并说明原因
              - - 行动判定原则
                - - - - 触发条件
                      - 当玩家描述的行动具有不确定性、风险或竞争性时，必须要求检定
                    - - 常见检定场景
                      - - - - 战斗
                            - 攻击命中、闪避、格挡、反击
                          - - 技能
                            - 开锁、潜行、侦察、说服、欺骗、威吓
                          - - 环境
                            - 攀爬、跳跃、游泳、推门、破坏
                          - - 豁免
                            - 抵抗毒素、魔法、恐惧、控制
                    - - 检定触发格式
                      - 请进行【XX检定】，对抗 DC XX
                    - - 注意
                      - 简单常规行动（如走路、说话、吃喝）无需检定
              - - 禁止行为
                - - 修改骰子结果
                  - 无视检定
                  - 规则外优待
                  - 临时改NPC数值
                  - 隐瞒HP变化
                  - 代替玩家决定
