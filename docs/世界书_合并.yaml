    - - - - DC表
          - - - - DC表
                - - - - 说明
                      - 各等级世界的难度等级（DC - Difficulty Class），世界阶位决定基础DC
                    - - 基础DC
                      - - - - F级
                            - 10
                          - - E级
                            - 13
                          - - D级
                            - 16
                          - - C级
                            - 19
                          - - B级
                            - 22
                          - - A级
                            - 25
                          - - S级
                            - 28
                    - - 困难DC
                      - 基础DC + 3
                    - - 极难DC
                      - 基础DC + 6
                    - - 使用说明
                      - - - - - 基础DC
                              - 常规行动
                        - - - - 困难DC
                              - 有一定难度的行动
                        - - - - 极难DC
                              - 非常困难的行动
        - - 对抗检定
          - - - - 对抗检定
                - - - - 说明
                      - 用于角色间直接对抗，如威吓与意志、欺骗与识破等
                    - - 核心机制
                      - 优势骰与劣势骰系统
                    - - 检定流程
                      - - DM说明双方对抗属性
                        - 计算双方属性加成差，确定基础优势骰
                        - 检查双方环境/状态修正，调整骰子池
                        - 双方按最终骰子池投骰
                        - 比较 D20结果 + 属性加成 + 其他加值，高者获胜
                    - - 优势骰
                      - - - - 说明
                            - 投多个D20取最高结果
                          - - 来源
                            - - - - 属性优势
                                  - 属性加成比对方高1点获得1个，每多1点多1个（上限3个）
                                - - 环境优势
                                  - 处于有利地形、高处、掩体后等
                                - - 状态优势
                                  - 拥有相关增益状态
                          - - 效果
                            - 投 (1+优势骰数量) 个D20，取最高值
                    - - 劣势骰
                      - - - - 说明
                            - 投多个D20取最低结果
                          - - 来源
                            - - - - 环境劣势
                                  - 处于不利地形、光线不足、地面湿滑等
                                - - 状态劣势
                                  - 拥有相关减益状态（中毒、受伤、恐惧等）
                          - - 效果
                            - 投 (1+劣势骰数量) 个D20，取最低值
                          - - 注意
                            - 劣势骰不来自属性差，仅来自环境与状态因素
                    - - 骰子池计算
                      - - - - 步骤
                            - - 计算属性差带来的优势骰（仅属性高的一方获得）
                              - 分别计算双方的环境/状态修正（优势骰或劣势骰）
                              - 双方各自的优势骰与劣势骰互相抵消
                              - 最终结果：有净优势骰则取最高，有净劣势骰则取最低，持平则投1个D20
                          - - 公式
                            - 最终骰数 = 1 + |净优势骰 - 净劣势骰|
                    - - 示例
                      - - - - 双方都有修正
                            - - - - 场景
                                  - 玩家A（敏捷16，F级）vs 玩家B（敏捷12，F级），A中毒，B站在高处
                                - - 计算
                                  - - - - 加成差
                                        - 1 → A获得1个属性优势骰
                                      - - A的状态
                                        - 1个劣势骰 → 净结果：1-1=0
                                      - - B的环境
                                        - 1个优势骰 → 净结果：1个优势骰
                                - - 结果
                                  - - - - 玩家A投骰
                                        - 1D20
                                      - - 玩家B投骰
                                        - 2D20取最高
        - - 标准检定
          - - - - 标准检定
                - - - - 说明
                      - 用于角色与环境交互，如开锁、侦察等
                    - - 公式
                      - D20 + 属性加成 + 掌握加成 + 额外修正值（如角色装备、技能，环境条件等） >= DC
                    - - 检定流程
                      - - 确定使用属性
                        - 确定DC值
                        - 投骰D20
                        - 计算最终值
                        - 与DC对比判定结果
                    - - 结果判定
                      - - - - 成功
                            - 最终值 >= DC
                          - - 失败
                            - 最终值 < DC
        - - 检定概念
          - - - - 检定概念
                - - - - 类型
                      - - - - 标准检定
                            - 行动 vs 环境，用于角色与环境交互
                          - - 对抗检定
                            - 角色间直接对抗
                    - - 失败惩罚
                      - - - - 说明
                            - 进入失败剧情线
                          - - 效果
                            - 50%几率扣除 (DC - 最终值)% HP（最少1%，最多10%）
                          - - 注意
                            - DM暗骰失败不扣血
                    - - 加成类型
                      - - - - 属性加成
                            - 天赋与蛮力，非线性成长，用于对抗检定获得优势
                          - - 掌握加成
                            - 经验与技巧，线性成长，用于标准检定克服环境挑战
